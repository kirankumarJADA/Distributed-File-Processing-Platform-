global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: file-upload-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['file-upload-service:8081']

  - job_name: processing-worker-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['processing-worker-service:8082']

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['notification-service:8083']
