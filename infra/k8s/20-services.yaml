# ---------------- Frontend ----------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: dfpp
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: ghcr.io/OWNER/dfpp-frontend:latest
          ports: [{ containerPort: 8080 }]
          readinessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "250m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: frontend, namespace: dfpp }
spec:
  selector: { app: frontend }
  ports: [{ port: 80, targetPort: 8080 }]
