apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-pvc
  namespace: dfpp
spec:
  accessModes: ["ReadWriteMany"]
  resources:
    requests:
      storage: 5Gi
---
# ---------------- API Gateway ----------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: dfpp
spec:
  replicas: 2
  selector:
    matchLabels: { app: api-gateway }
  template:
    metadata:
      labels: { app: api-gateway }
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/OWNER/dfpp-api-gateway:latest
          ports: [{ containerPort: 8080 }]
          env:
            - { name: SERVER_PORT, value: "8080" }
          envFrom:
            - configMapRef: { name: dfpp-config }
            - secretRef: { name: dfpp-secret }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            initialDelaySeconds: 50
            periodSeconds: 15
          resources:
            requests: { cpu: "150m", memory: "320Mi" }
            limits: { cpu: "750m", memory: "640Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: api-gateway, namespace: dfpp }
spec:
  selector: { app: api-gateway }
  ports: [{ port: 8080, targetPort: 8080 }]
---
# ---------------- File Upload Service ----------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-upload-service
  namespace: dfpp
spec:
  replicas: 2
  selector:
    matchLabels: { app: file-upload-service }
  template:
    metadata:
      labels: { app: file-upload-service }
    spec:
      containers:
        - name: file-upload-service
          image: ghcr.io/OWNER/dfpp-file-upload-service:latest
          ports: [{ containerPort: 8081 }]
          env:
            - { name: SERVER_PORT, value: "8081" }
          envFrom:
            - configMapRef: { name: dfpp-config }
            - secretRef: { name: dfpp-secret }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8081 }
            initialDelaySeconds: 35
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8081 }
            initialDelaySeconds: 55
            periodSeconds: 15
          volumeMounts:
            - { name: uploads, mountPath: /data/uploads }
          resources:
            requests: { cpu: "200m", memory: "384Mi" }
            limits: { cpu: "1", memory: "768Mi" }
      volumes:
        - name: uploads
          persistentVolumeClaim: { claimName: uploads-pvc }
---
apiVersion: v1
kind: Service
metadata: { name: file-upload-service, namespace: dfpp }
spec:
  selector: { app: file-upload-service }
  ports: [{ port: 8081, targetPort: 8081 }]
---
# ---------------- Processing Worker Service ----------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: processing-worker-service
  namespace: dfpp
spec:
  replicas: 3
  selector:
    matchLabels: { app: processing-worker-service }
  template:
    metadata:
      labels: { app: processing-worker-service }
    spec:
      containers:
        - name: processing-worker-service
          image: ghcr.io/OWNER/dfpp-processing-worker-service:latest
          ports: [{ containerPort: 8082 }]
          env:
            - { name: SERVER_PORT, value: "8082" }
            - name: WORKER_ID
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
          envFrom:
            - configMapRef: { name: dfpp-config }
            - secretRef: { name: dfpp-secret }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8082 }
            initialDelaySeconds: 35
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8082 }
            initialDelaySeconds: 55
            periodSeconds: 15
          volumeMounts:
            - { name: uploads, mountPath: /data/uploads }
          resources:
            requests: { cpu: "250m", memory: "448Mi" }
            limits: { cpu: "1500m", memory: "1Gi" }
      volumes:
        - name: uploads
          persistentVolumeClaim: { claimName: uploads-pvc }
---
apiVersion: v1
kind: Service
metadata: { name: processing-worker-service, namespace: dfpp }
spec:
  selector: { app: processing-worker-service }
  ports: [{ port: 8082, targetPort: 8082 }]
---
