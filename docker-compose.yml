name: dfpp

x-backend-build: &backend-build
  context: .
  dockerfile: infra/docker/Dockerfile.backend

services:
  # ---------------- Infrastructure ----------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dfpp
      POSTGRES_USER: dfpp
      POSTGRES_PASSWORD: dfpp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dfpp"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports: ["5432:5432"]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    ports: ["6379:6379"]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports: ["9092:9092"]
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 12

  # ---------------- Application services ----------------
  api-gateway:
    build: { <<: *backend-build, args: { SERVICE: api-gateway } }
    environment:
      SERVER_PORT: 8080
      REDIS_HOST: redis
      UPSTREAM_UPLOAD: http://file-upload-service:8081
      UPSTREAM_WORKER: http://processing-worker-service:8082
      UPSTREAM_NOTIFY: http://notification-service:8083
      UPSTREAM_NOTIFY_WS: ws://notification-service:8083
    depends_on:
      redis: { condition: service_healthy }
    ports: ["8080:8080"]

  file-upload-service:
    build: { <<: *backend-build, args: { SERVICE: file-upload-service } }
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://postgres:5432/dfpp
      KAFKA_BOOTSTRAP: kafka:29092
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
    ports: ["8081:8081"]

  processing-worker-service:
    build: { <<: *backend-build, args: { SERVICE: processing-worker-service } }
    environment:
      SERVER_PORT: 8082
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP: kafka:29092
      WORKER_ID: worker-1
      WORKER_CONCURRENCY: 3
    volumes:
      - uploads:/data/uploads
    depends_on:
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    deploy:
      replicas: 2
    ports: ["8082"]

  notification-service:
    build: { <<: *backend-build, args: { SERVICE: notification-service } }
    environment:
      SERVER_PORT: 8083
      KAFKA_BOOTSTRAP: kafka:29092
    depends_on:
      kafka: { condition: service_healthy }
    ports: ["8083:8083"]

  frontend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend
    depends_on: [api-gateway]
    ports: ["5173:8080"]

  # ---------------- Observability ----------------
  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on: [prometheus]
    ports: ["3000:3000"]

volumes:
  pgdata:
  uploads:
