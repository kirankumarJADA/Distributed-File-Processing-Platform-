name: ci-cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/dfpp

jobs:
  backend-tests:
    name: Backend · build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build & run unit tests
        working-directory: backend
        run: mvn -B -ntp clean verify
      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/**/target/surefire-reports/*.xml
          if-no-files-found: ignore

  frontend-build:
    name: Frontend · lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm install --no-audit --no-fund
      - name: Lint
        working-directory: frontend
        run: npm run lint || true
      - name: Build
        working-directory: frontend
        run: npm run build

  docker-images:
    name: Docker · build & push to GHCR
    needs: [backend-tests, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: api-gateway
            dockerfile: infra/docker/Dockerfile.backend
            build_arg: SERVICE=api-gateway
          - service: file-upload-service
            dockerfile: infra/docker/Dockerfile.backend
            build_arg: SERVICE=file-upload-service
          - service: processing-worker-service
            dockerfile: infra/docker/Dockerfile.backend
            build_arg: SERVICE=processing-worker-service
          - service: notification-service
            dockerfile: infra/docker/Dockerfile.backend
            build_arg: SERVICE=notification-service
          - service: frontend
            dockerfile: infra/docker/Dockerfile.frontend
            build_arg: ''
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_arg }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-ready:
    name: Deployment manifest validation
    needs: docker-images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Kubernetes manifests
        run: |
          curl -sLo kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar xzf kubeconform.tar.gz
          ./kubeconform -strict -ignore-missing-schemas infra/k8s/*.yaml
